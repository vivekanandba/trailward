<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trailward — treks near you</title>
    <meta
      name="description"
      content="Trailward — discover treks within a radius of any place. Bangalore by default."
    />
    <link rel="icon" type="image/svg+xml" href="/trailward/icon.svg" />
    <link rel="apple-touch-icon" href="/trailward/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/trailward/manifest.webmanifest" />
    <link rel="canonical" href="https://vivekanandba.github.io/trailward/" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#2f6b3f" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a" />
    <!-- Social cards -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Trailward — treks near you" />
    <meta
      property="og:description"
      content="Interactive map of treks within a chosen radius of any place. Bangalore by default."
    />
    <meta property="og:url" content="https://vivekanandba.github.io/trailward/" />
    <meta property="og:image" content="https://vivekanandba.github.io/trailward/icons/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <!-- Apply the saved/system theme before first paint to avoid a flash. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("trailward:theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          document.documentElement.classList.toggle("dark", t === "dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
